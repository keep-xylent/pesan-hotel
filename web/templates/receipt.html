<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt | LUXE HOTEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>THANK YOU</h1>
        <p class="subtitle">Your reservation is confirmed</p>
    </header>

    <main class="container">
        <div class="receipt">
            <h2>LUXE HOTEL</h2>
            <div style="text-align: center; font-size: 0.8rem; color: #888; margin-bottom: 2rem;">
                Official Digital Receipt
            </div>

            <div class="receipt-row">
                <span>Nama Pemesan</span>
                <span style="font-weight: 600;">{{ data.nama }}</span>
            </div>
            <div class="receipt-row">
                <span>Room Type</span>
                <span>{{ data.tipe }}</span>
            </div>
            <div class="receipt-row">
                <span>Check-In</span>
                <span>{{ data.check_in }}</span>
            </div>
            <div class="receipt-row">
                <span>Check-Out</span>
                <span>{{ data.check_out }}</span>
            </div>
            <div class="receipt-row">
                <span>Duration</span>
                <span>{{ data.durasi }} night(s)</span>
            </div>

            <div class="receipt-row total">
                <span>TOTAL AMOUNT</span>
                <span>{{ data.total | rupiah }}</span>
            </div>

            <div style="margin-top: 3rem; text-align: center; border: 2px solid var(--primary); padding: 1rem; color: var(--primary); font-weight: 700; letter-spacing: 2px;">
                CONFIRMED
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 2rem;">
            <button onclick="window.print()" class="btn" style="background: transparent; border: 1px solid var(--primary); color: var(--primary);">Print Receipt</button>
            <br>
            <a href="{{ url_for('index') }}" class="back-link">Return to Home</a>
        </div>
    </main>
</body>
</html>
